# mtk-gpu-oc — example config: 1200 MHz OC on MT6789 stock module
#
# Three modes — pick ONE:
#
#   Mode "top" — set ceiling, voltage auto-calculated from stock curve
#   Mode "top+bottom" — set both bounds, voltages interpolated
#   Mode "full" — override every OPP entry explicitly
#
# Uncomment only the [oc] block for your chosen mode.

[module]
path = "research/stock/mtk_gpufreq_mt6789.ko"

# === Mode "top": just the ceiling, everything else auto-calculated ===
[oc]
max_freq_mhz = 1200
# max_volt_mv = 943.75    # optional; auto-calculated from top-two slope if omitted
# min_freq_mhz = 390      # optional; stock floor if omitted
# min_volt_mv  = 675      # optional; calculated from curve if omitted

# === Mode "top+bottom": explicit bounds (uncomment to use) ===
# [oc]
# max_freq_mhz = 1200
# min_freq_mhz = 390
# max_volt_mv  = 943.75
# min_volt_mv  = 675

# === Mode "full": explicit per-OPP override (uncomment to use) ===
